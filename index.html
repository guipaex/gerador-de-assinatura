<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Gerador de Assinatura</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&family=Rubik:ital,wght@0,300..900;1,300..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/global.css" />
  </head>
  <body>
    <main>
      <h1>Gerador de Assinatura de E-mail</h1>
      <form id="signatureForm">
        <fieldset>
          <label for="bgSelect">Empresa</label>
          <select id="bgSelect"></select>
          <label for="nameInput">Nome</label>
          <input
            type="text"
            id="nameInput"
            required
            placeholder="Nome e Sobrenome"
          />

          <label for="titleInput">Cargo/Setor</label>
          <input
            type="text"
            id="titleInput"
            required
            placeholder="Cargo / Setor"
          />
        </fieldset>
      </form>

      <div id="canvasWrapper">
        <canvas
          id="signatureCanvas"
          width="855"
          height="200"
          aria-label="Pré‑visualização da assinatura"
        ></canvas>
      </div>

      <div>
        <button id="exportButton">
          Salvar imagem
          <!-- <span class="material-symbols-rounded"> download_2 </span> -->
        </button>
      </div>
    </main>

    <div class="sr-only" aria-hidden="true">
      <span id="styleName" class="signature-name"></span>
      <span id="styleTitle" class="signature-title"></span>
    </div>
    <footer>
      <a href="https://www.guipaes.com" target="_blank">
        <p>Desenvolvido por Gui Paes</p>
        <!-- <span class="material-symbols-rounded"> rocket_launch </span> -->
      </a>
    </footer>
    <script src="./js/main.js"></script>
  </body>
</html>
